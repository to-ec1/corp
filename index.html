              <div className="max-w-7xl mx-auto px-6 space-y-12">
                <div className="flex flex-col md:flex-row md:items-end justify-between gap-4">
                  <div className="space-y-2">
                    <span className="text-xs font-bold uppercase tracking-widest text-[var(--secondary)]">{t('catSub')}</span>
                    <h3 className="text-2xl md:text-4xl font-extrabold text-[var(--primary)]">{t('catTitle')}</h3>
                    <p className="text-xs md:text-sm text-[var(--text-muted)]">{t('catDesc')}</p>
                  </div>

                  {/* Filter tabs */}
                  <div className="flex items-center gap-2 bg-[var(--primary)]/5 p-1 rounded-full border border-[var(--border-color)] shrink-0 self-start md:self-auto">
                    <button 
                      onClick={() => setActiveTab("all")} 
                      className={`px-4 py-1.5 text-xs font-bold rounded-full transition-all cursor-pointer ${activeTab === 'all' ? 'bg-[var(--primary)] text-[var(--bg)] shadow-sm' : 'text-[var(--text)] hover:opacity-80'}`}
                    >
                      {t('tabAll')}
                    </button>
                    <button 
                      onClick={() => setActiveTab("general")} 
                      className={`px-4 py-1.5 text-xs font-bold rounded-full transition-all cursor-pointer ${activeTab === 'general' ? 'bg-[var(--primary)] text-[var(--bg)] shadow-sm' : 'text-[var(--text)] hover:opacity-80'}`}
                    >
                      {t('tabGeneral')}
                    </button>
                    <button 
                      onClick={() => setActiveTab("beauty")} 
                      className={`px-4 py-1.5 text-xs font-bold rounded-full transition-all cursor-pointer ${activeTab === 'beauty' ? 'bg-[var(--primary)] text-[var(--bg)] shadow-sm' : 'text-[var(--text)] hover:opacity-80'}`}
                    >
                      {t('tabBeauty')}
                    </button>
                  </div>
                </div>

                {/* Product Grid */}
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                  {filteredProducts.map((p) => {
                    const quantity = favoriteCart[p.id] || 0;
                    const isSelected = quantity > 0;
                    const calculatedTotal = calculatePrice(p, quantity);
                    const discountRate = calculateDiscountPercentage(p, quantity);
                    const itemData = p[lang] || p["ja"];

                    return (
                      <div 
                        key={p.id}
                        className={`bg-[var(--bg)] border rounded-[var(--radius)] overflow-hidden transition-all duration-300 flex flex-col justify-between ${
                          isSelected ? 'ring-2 ring-[var(--primary)] border-transparent shadow-lg' : 'border-[var(--border-color)] hover:shadow-md'
                        }`}
                      >
                        {/* Product Image Area with Category Badge & Error/Fallback Handler */}
                        <div className="relative h-48 overflow-hidden bg-white border-b border-[var(--border-color)] flex items-center justify-center">
                          <img 
                            src={p.img} 
                            onError={(e) => { e.target.onerror = null; e.target.src = p.fallback; }}
                            alt={itemData.name} 
                            className="w-full h-full object-cover object-center"
                          />
                          <span className="absolute top-3 left-3 bg-white/90 backdrop-blur-sm text-[var(--primary)] text-[10px] font-black px-2.5 py-1 rounded-full shadow-sm">
                            {p.category === 'general' ? t('tagGeneral') : t('tagBeauty')}
                          </span>
                          {discountRate > 0 && (
                            <span className="absolute top-3 right-3 bg-[var(--secondary)] text-[var(--primary)] text-[10px] font-black px-2.5 py-1 rounded-full shadow-md animate-bounce">
                              {t('bulkDiscount')} {discountRate}% OFF
                            </span>
                          )}
                        </div>

                        {/* Product details */}
                        <div className="p-5 flex-1 flex flex-col justify-between space-y-4">
                          <div className="space-y-2">
                            <h4 className="text-base font-extrabold leading-snug">{itemData.name}</h4>
                            <p className="text-xs text-[var(--text-muted)] leading-relaxed line-clamp-3">{itemData.desc}</p>
                            {itemData.spec && (
                              <p className="text-[10px] text-[var(--text-muted)] bg-[var(--card-bg)] p-2 rounded border border-[var(--border-color)] font-sans">{itemData.spec}</p>
                            )}
                          </div>

                          <div className="pt-2 border-t border-[var(--border-color)] space-y-3">
                            <div className="flex justify-between items-center text-xs">
                              <span className="text-[var(--text-muted)]">{t('refWholesalePrice')}</span>
                              <span className="font-bold text-sm text-[var(--primary)]">¥{p.basePrice.toLocaleString()} <span className="text-[10px] font-normal text-[var(--text-muted)]">{t('unitTaxExcl')}</span></span>
                            </div>
                            <div className="flex justify-between items-center text-xs">
                              <span className="text-[var(--text-muted)]">{t('minLotQty')}</span>
                              <span className="font-bold text-[var(--secondary)]">{p.minLot}{t('unitSuffix')}</span>
                            </div>

                            {/* Dynamic Lot Counter Inputs */}
                            <div className="space-y-2 bg-[var(--card-bg)] p-3 rounded-[var(--radius)] border border-[var(--border-color)] shadow-inner">
                              <label className="block text-[10px] font-bold text-[var(--text-muted)] uppercase">{t('simTitle')}</label>
                              <div className="flex items-center gap-2">
                                <button 
                                  onClick={() => updateQuantity(p.id, Math.max(0, quantity - (quantity === p.minLot ? p.minLot : 5)))}
                                  className="w-8 h-8 rounded border border-[var(--border-color)] bg-[var(--bg)] flex items-center justify-center font-bold hover:bg-[var(--primary)] hover:text-[var(--bg)] cursor-pointer animate-none"
                                >
                                  -
                                </button>
                                <input 
                                  type="number"
                                  value={quantity || ''}
                                  onChange={(e) => updateQuantity(p.id, Math.max(0, parseInt(e.target.value) || 0))}
                                  placeholder={`${lang === 'ja' ? '最小' : 'Min'} ${p.minLot}`}
                                  className="flex-1 min-w-[60px] h-8 text-center text-xs border border-[var(--border-color)] rounded focus:outline-none focus:ring-1 focus:ring-[var(--primary)] bg-white text-[var(--text)]"
                                />
                                <button 
                                  onClick={() => updateQuantity(p.id, quantity === 0 ? p.minLot : quantity + 5)}
                                  className="w-8 h-8 rounded border border-[var(--border-color)] bg-[var(--bg)] flex items-center justify-center font-bold hover:bg-[var(--primary)] hover:text-[var(--bg)] cursor-pointer animate-none"
                                >
                                  +
                                </button>
                              </div>

                              {/* Price output */}
                              {quantity > 0 && (
                                <div className="mt-2 pt-2 border-t border-[var(--border-color)] flex justify-between items-center text-xs">
                                  <span className="text-[var(--text-muted)]">{t('estSubtotal')}</span>
                                  <div className="text-right">
                                    <div className="font-black text-[var(--primary)] text-sm">
                                      ¥{calculatedTotal.toLocaleString()} <span className="text-[9px] font-normal text-[var(--text-muted)]">{t('taxExcl')}</span>
                                    </div>
                                    {discountRate > 0 ? (
                                      <span className="text-[10px] text-[var(--secondary)] font-extrabold block">{t('bulkApplied')}</span>
                                    ) : (
                                      <span className="text-[9px] text-[var(--text-muted)] block">
                                        {t('bulkNextInfo1')}
                                        {((quantity < p.minLot * 2) ? (p.minLot * 2) - quantity : (p.minLot * 5) - quantity)}
                                        {t('bulkNextInfo2')}
                                      </span>
                                    )}
                                  </div>
                                </div>
                              )}
                            </div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Estimate Summary Box */}
                {Object.values(favoriteCart).some(qty => qty > 0) && (
                  <div className="bg-gradient-to-r from-[var(--primary)] to-[var(--accent)] text-white p-6 md:p-8 rounded-[var(--radius)] shadow-xl mt-12">
                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-6">
                      <div className="space-y-1">
                        <h4 className="text-lg md:text-xl font-bold text-white">{t('summaryTitle')}</h4>
                        <p className="text-xs text-white/80">{t('summaryDesc')}</p>
                      </div>
                      <div className="text-right">
                        <span className="text-xs text-white/80 uppercase tracking-widest block mb-1">{t('summaryEstTotal')}</span>
                        <span className="text-3xl md:text-4xl font-black text-[var(--secondary)]">
                          ¥{PRODUCTS.reduce((acc, p) => acc + calculatePrice(p, favoriteCart[p.id] || 0), 0).toLocaleString()}
                        </span>
                      </div>
                      <div className="shrink-0">
                        <a 
                          href="#contact" 
                          onClick={() => {
                            const items = PRODUCTS.filter(p => favoriteCart[p.id] > 0).map(p => `${(p[lang] || p["ja"]).name} x ${favoriteCart[p.id]}${t('unitSuffix')}`).join("\n");
                            setContactForm(prev => ({
                              ...prev,
                              message: `${t('inquireTemplatePrefix')}${items}${t('inquireTemplateSuffix')}`
                            }));
                          }}
                          className="bg-[var(--secondary)] text-[var(--primary)] hover:opacity-95 font-bold px-6 py-3 rounded-[var(--radius)] text-sm shadow transition block text-center"
                        >
                          {t('summaryCta')}
                        </a>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </section>

            {/* COMPANY PROFILE */}
            <section id="profile" className="py-20 bg-[var(--card-bg)] border-t border-[var(--border-color)]">
              <div className="max-w-4xl mx-auto px-6 space-y-12">
                <div className="text-center space-y-2">
                  <span className="text-xs font-bold uppercase tracking-widest text-[var(--secondary)]">{t('profileSub')}</span>
                  <h3 className="text-2xl md:text-3xl font-extrabold text-[var(--primary)]">{t('profileTitle')}</h3>
                </div>

                <div className="border border-[var(--border-color)] rounded-[var(--radius)] overflow-hidden shadow-sm bg-[var(--bg)]">
                  <div className="grid grid-cols-1 md:grid-cols-12 border-b border-[var(--border-color)] text-xs md:text-sm">
                    <div className="md:col-span-4 bg-[var(--primary)]/5 p-4 font-bold text-[var(--primary)]">{t('profNameLabel')}</div>
                    <div className="md:col-span-8 p-4 bg-white text-[var(--text)] font-medium">{t('profNameVal')}</div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-12 border-b border-[var(--border-color)] text-xs md:text-sm">
                    <div className="md:col-span-4 bg-[var(--primary)]/5 p-4 font-bold text-[var(--primary)]">{t('profBizLabel')}</div>
                    <div className="md:col-span-8 p-4 bg-white text-[var(--text)] font-medium space-y-1.5">
                      <p>{t('profBizVal1')}</p>
                      <p>{t('profBizVal2')}</p>
                      <p>{t('profBizVal3')}</p>
                    </div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-12 border-b border-[var(--border-color)] text-xs md:text-sm">
                    <div className="md:col-span-4 bg-[var(--primary)]/5 p-4 font-bold text-[var(--primary)]">{t('profRepLabel')}</div>
                    <div className="md:col-span-8 p-4 bg-white text-[var(--text)] font-medium">{t('profRepVal')}</div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-12 border-b border-[var(--border-color)] text-xs md:text-sm">
                    <div className="md:col-span-4 bg-[var(--primary)]/5 p-4 font-bold text-[var(--primary)]">{t('profEstLabel')}</div>
                    <div className="md:col-span-8 p-4 bg-white text-[var(--text)] font-medium">{t('profEstVal')}</div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-12 border-b border-[var(--border-color)] text-xs md:text-sm">
                    <div className="md:col-span-4 bg-[var(--primary)]/5 p-4 font-bold text-[var(--primary)]">{t('profLocLabel')}</div>
                    <div className="md:col-span-8 p-4 bg-white text-[var(--text)] font-medium">{t('profLocVal')}</div>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-12 text-xs md:text-sm">
                    <div className="md:col-span-4 bg-[var(--primary)]/5 p-4 font-bold text-[var(--primary)]">{t('profBankLabel')}</div>
                    <div className="md:col-span-8 p-4 bg-white text-[var(--text)] font-medium">{t('profBankVal')}</div>
                  </div>
                </div>
              </div>
            </section>

            {/* CONTACT FORM */}
            <section id="contact" className="py-20 px-6 md:px-12 max-w-4xl mx-auto space-y-12">
              <div className="text-center space-y-2">
                <span className="text-xs font-bold uppercase tracking-widest text-[var(--secondary)]">{t('contactSub')}</span>
                <h3 className="text-2xl md:text-3xl font-extrabold text-[var(--primary)]">{t('contactTitle')}</h3>
                <p className="text-xs md:text-sm text-[var(--text-muted)]">{t('contactDesc')}</p>
              </div>

              {formSubmitted ? (
                <div className="bg-emerald-50 border border-emerald-200 p-8 rounded-[var(--radius)] text-center space-y-4">
                  <div className="w-16 h-16 bg-emerald-500 text-white rounded-full flex items-center justify-center mx-auto text-2xl">
                    <i className="lucide-check"></i>
                  </div>
                  <h4 className="text-lg font-bold text-emerald-800">{t('formSuccessTitle')}</h4>
                  <p className="text-sm text-emerald-600 leading-relaxed max-w-md mx-auto">
                    {t('formSuccessDesc')}
                  </p>
                  <button 
                    onClick={() => { setFormSubmitted(false); setContactForm({ name: "", email: "", company: "", message: "", category: "wholesale" }); }}
                    className="mt-4 bg-[var(--primary)] text-[var(--bg)] px-6 py-2.5 rounded-[var(--radius)] text-xs font-bold cursor-pointer"
                  >
                    {t('formSuccessReset')}
                  </button>
                </div>
              ) : (
                <form onSubmit={handleContactSubmit} className="bg-[var(--card-bg)] p-6 md:p-8 rounded-[var(--radius)] border border-[var(--border-color)] shadow-[var(--shadow)] space-y-5">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div className="space-y-1">
                      <label className="block text-xs font-bold text-[var(--text)]">
                        {t('formLabelName')} <span className="text-red-500">*</span>
                      </label>
                      <input 
                        type="text" 
                        required
                        value={contactForm.name}
                        onChange={(e) => setContactForm({...contactForm, name: e.target.value})}
                        placeholder={t('formPlaceholderName')}
                        className="w-full bg-[var(--bg)] border border-[var(--border-color)] rounded-[var(--radius)] px-4 py-2.5 text-xs focus:outline-none focus:ring-1 focus:ring-[var(--primary)] text-[var(--text)]"
                      />
                    </div>
                    <div className="space-y-1">
                      <label className="block text-xs font-bold text-[var(--text)]">{t('formLabelCompany')}</label>
                      <input 
                        type="text" 
                        value={contactForm.company}
                        onChange={(e) => setContactForm({...contactForm, company: e.target.value})}
                        placeholder={t('formPlaceholderCompany')}
                        className="w-full bg-[var(--bg)] border border-[var(--border-color)] rounded-[var(--radius)] px-4 py-2.5 text-xs focus:outline-none focus:ring-1 focus:ring-[var(--primary)] text-[var(--text)]"
                      />
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div className="space-y-1">
                      <label className="block text-xs font-bold text-[var(--text)]">
                        {t('formLabelEmail')} <span className="text-red-500">*</span>
                      </label>
                      <input 
                        type="email" 
                        required
                        value={contactForm.email}
                        onChange={(e) => setContactForm({...contactForm, email: e.target.value})}
                        placeholder={t('formPlaceholderEmail')}
                        className="w-full bg-[var(--bg)] border border-[var(--border-color)] rounded-[var(--radius)] px-4 py-2.5 text-xs focus:outline-none focus:ring-1 focus:ring-[var(--primary)] text-[var(--text)]"
                      />
                    </div>
                    <div className="space-y-1">
                      <label className="block text-xs font-bold text-[var(--text)]">{t('formLabelCategory')}</label>
                      <select 
                        value={contactForm.category}
                        onChange={(e) => setContactForm({...contactForm, category: e.target.value})}
                        className="w-full bg-[var(--bg)] border border-[var(--border-color)] rounded-[var(--radius)] px-4 py-2.5 text-xs focus:outline-none focus:ring-1 focus:ring-[var(--primary)] text-[var(--text)]"
                      >
                        {CATEGORY_KEYS.map((key, idx) => (
                          <option key={key} value={key}>
                            {t(`formOption${idx + 1}`)}
                          </option>
                        ))}
                      </select>
                    </div>
                  </div>

                  <div className="space-y-1">
                    <label className="block text-xs font-bold text-[var(--text)]">
                      {t('formLabelMessage')} <span className="text-red-500">*</span>
                    </label>
                    <textarea 
                      required
                      rows="5"
                      value={contactForm.message}
                      onChange={(e) => setContactForm({...contactForm, message: e.target.value})}
                      placeholder={t('formPlaceholderMessage')}
                      className="w-full bg-[var(--bg)] border border-[var(--border-color)] rounded-[var(--radius)] px-4 py-3 text-xs focus:outline-none focus:ring-1 focus:ring-[var(--primary)] text-[var(--text)]"
                    ></textarea>
                  </div>

                  <button 
                    type="submit"
                    className="w-full bg-[var(--primary)] hover:opacity-90 text-[var(--bg)] py-3 rounded-[var(--radius)] font-bold text-xs tracking-wider uppercase transition shadow-[var(--shadow)] cursor-pointer"
                  >
                    {t('formSubmit')}
                  </button>
                </form>
              )}
            </section>

            {/* TOAST SYSTEM */}
            {toast && (
              <div className="fixed bottom-6 right-6 bg-slate-900/95 backdrop-blur text-white px-5 py-4 rounded-xl shadow-2xl z-50 max-w-sm flex items-start gap-3 border border-white/10 animate-slide-up">
                <div className="w-5 h-5 rounded-full bg-[var(--secondary)] text-[var(--primary)] flex items-center justify-center shrink-0 mt-0.5 text-xs font-black">
                  i
                </div>
                <div>
                  <p className="text-xs font-bold">{t('toastSystemTitle')}</p>
                  <p className="text-xs text-slate-300 mt-1 leading-snug">{toast}</p>
                </div>
              </div>
            )}

            {/* FOOTER */}
            <footer className="bg-slate-950 text-slate-400 py-12 px-6 md:px-12 border-t-8 border-[var(--primary)]">
              <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-8">
                <div className="space-y-4">
                  <div className="flex items-center gap-2">
                    <div className="w-8 h-8 rounded-full bg-white text-slate-950 flex items-center justify-center font-bold text-sm">
                      TO
                    </div>
                    <div>
                      <h4 className="text-sm font-bold text-white uppercase tracking-tight">{t('profNameVal')}</h4>
                      <p className="text-[9px] tracking-wider text-slate-500">TAKE ON Co., Ltd.</p>
                    </div>
                  </div>
                  <p className="text-xs leading-relaxed text-slate-500">
                    {t('footerSlogan')}
                  </p>
                </div>
                
                <div>
                  <h5 className="text-xs font-bold text-white uppercase tracking-wider mb-3">{t('footerCatTitle')}</h5>
                  <ul className="space-y-2 text-xs">
                    <li><a href="#products" onClick={() => setActiveTab("general")} className="hover:text-white transition">{t('footerCat1')}</a></li>
                    <li><a href="#products" onClick={() => setActiveTab("general")} className="hover:text-white transition">{t('footerCat2')}</a></li>
                    <li><a href="#products" onClick={() => setActiveTab("beauty")} className="hover:text-white transition">{t('footerCat3')}</a></li>
                    <li><a href="#products" onClick={() => setActiveTab("beauty")} className="hover:text-white transition">{t('footerCat4')}</a></li>
                  </ul>
                </div>

                <div>
                  <h5 className="text-xs font-bold text-white uppercase tracking-wider mb-3">{t('footerSiteInfoTitle')}</h5>
                  <p className="text-xs text-slate-500 leading-relaxed mb-2">
                    {t('footerSiteInfoDesc')}
                  </p>
                </div>

                <div className="space-y-3">
                  <h5 className="text-xs font-bold text-white uppercase tracking-wider">{t('footerOfficeTitle')}</h5>
                  <p className="text-xs leading-relaxed text-slate-500 whitespace-pre-line">
                    {t('footerOfficeDesc')}
                  </p>
                </div>
              </div>

              <div className="max-w-7xl mx-auto mt-12 pt-6 border-t border-slate-900 text-center text-[10px] text-slate-600 flex flex-col sm:flex-row justify-between items-center gap-4">
                <p>© 2026 TAKE ON Co., Ltd. All Rights Reserved.</p>
                <div className="flex gap-4">
                  <a href="#" className="hover:text-white transition">{t('footerPolicy')}</a>
                  <a href="#" className="hover:text-white transition">{t('footerLaw')}</a>
                </div>
              </div>
            </footer>

          </div>
        );
      }

      // Render App inside div#root
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
