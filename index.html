                      onChange={(e) => setContactForm({...contactForm, message: e.target.value})}
                      placeholder="新規取引条件や見積シミュレーション希望の商品など、具体的な要望をご記入ください。"
                      className="w-full bg-[var(--bg)] border border-[var(--border-color)] rounded-[var(--radius)] px-4 py-3 text-xs focus:outline-none focus:ring-1 focus:ring-[var(--primary)]"
                    ></textarea>
                  </div>

                  <button 
                    type="submit"
                    className="w-full bg-[var(--primary)] hover:opacity-90 text-[var(--card-bg)] py-3 rounded-[var(--radius)] font-bold text-xs tracking-wider uppercase transition shadow-[var(--shadow)] cursor-pointer"
                  >
                    入力内容を送信する (送信シミュレーション)
                  </button>
                </form>
              )}
            </section>

            {/* TOAST SYSTEM */}
            {toast && (
              <div className="fixed bottom-6 right-6 bg-slate-900/95 backdrop-blur text-white px-5 py-4 rounded-xl shadow-2xl z-50 max-w-sm flex items-start gap-3 border border-white/10 animate-slide-up">
                <div className="w-5 h-5 rounded-full bg-[var(--secondary)] text-[var(--primary)] flex items-center justify-center shrink-0 mt-0.5 text-xs font-black">
                  i
                </div>
                <div>
                  <p className="text-xs font-bold">システム通知</p>
                  <p className="text-xs text-slate-300 mt-1 leading-snug">{toast}</p>
                </div>
              </div>
            )}

            {/* FOOTER */}
            <footer className="bg-slate-950 text-slate-400 py-12 px-6 md:px-12 border-t-8 border-[var(--primary)] transition-all duration-300">
              <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-8">
                <div className="space-y-4">
                  <div className="flex items-center gap-2">
                    <div className="w-8 h-8 rounded-full bg-white text-slate-950 flex items-center justify-center font-bold text-sm">
                      TO
                    </div>
                    <div>
                      <h4 className="text-sm font-bold text-white uppercase tracking-tight">テイクオン株式会社</h4>
                      <p className="text-[9px] tracking-wider text-slate-500">TAKE ON Co., Ltd.</p>
                    </div>
                  </div>
                  <p className="text-xs leading-relaxed text-slate-500">
                    世界中の「確かな品質」を、より迅速かつ安全に。雑貨・美容健康の専門総合卸売。
                  </p>
                </div>
                
                <div>
                  <h5 className="text-xs font-bold text-white uppercase tracking-wider mb-3">取扱カテゴリ</h5>
                  <ul className="space-y-2 text-xs">
                    <li><a href="#products" onClick={() => setActiveTab("general")} className="hover:text-white transition">バッグ・ファッション小物</a></li>
                    <li><a href="#products" onClick={() => setActiveTab("general")} className="hover:text-white transition">海外コスメ・プレミアム香水</a></li>
                    <li><a href="#products" onClick={() => setActiveTab("beauty")} className="hover:text-white transition">アロマ機器・空間ディフューザー</a></li>
                    <li><a href="#products" onClick={() => setActiveTab("beauty")} className="hover:text-white transition">健康食品・サプリメント</a></li>
                  </ul>
                </div>

                <div>
                  <h5 className="text-xs font-bold text-white uppercase tracking-wider mb-3">デザイン体験中</h5>
                  <p className="text-xs text-slate-500 leading-relaxed mb-2">
                    現在、<strong>{currentTheme.jpName}</strong> を体験中です。上のパレットスイッチャーでお好みの世界観に。
                  </p>
                  <button 
                    onClick={() => {
                      const el = document.getElementById("style-selection-bar");
                      if(el) el.scrollIntoView({ behavior: 'smooth' });
                    }}
                    className="text-xs text-[var(--secondary)] font-bold hover:underline cursor-pointer"
                  >
                    → 別のテーマに着替える
                  </button>
                </div>

                <div className="space-y-3">
                  <h5 className="text-xs font-bold text-white uppercase tracking-wider">オフィス</h5>
                  <p className="text-xs leading-relaxed text-slate-500">
                    〒260-0013 千葉県千葉市中央区中央2丁目<br/>
                    TEL: 043-XXX-XXXX<br/>
                    E-mail: info@takeon-dummy.co.jp
                  </p>
                </div>
              </div>

              <div className="max-w-7xl mx-auto mt-12 pt-6 border-t border-slate-900 text-center text-[10px] text-slate-600 flex flex-col sm:flex-row justify-between items-center gap-4">
                <p>© 2026 TAKE ON Co., Ltd. All Rights Reserved. (Demo in AI Studio Platform)</p>
                <div className="flex gap-4">
                  <a href="#" className="hover:text-white transition">プライバシーポリシー</a>
                  <a href="#" className="hover:text-white transition">特定商取引法に基づく表記</a>
                </div>
              </div>
            </footer>

          </div>
        );
      }

      // Render App inside div#root
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
